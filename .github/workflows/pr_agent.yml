name: PR-Agent

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - review_requested

  issue_comment:
    types:
      - created

  workflow_dispatch:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: write

    name: PR-Agent Review

    steps:
      - name: Run PR-Agent
        uses: the-pr-agent/pr-agent@main

        env:
          # GitHub
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # LiteLLM
          OPENAI__KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI__API_BASE: https://litellm.lrate.top/v1

          # Model
          config.model: "gpt-oss-120b"
          config.fallback_models: '["gpt-oss-120b"]'
          config.custom_model_max_tokens: "131072"
          config.custom_reasoning_model: "true"

          # Auto Actions
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"

          github_action_config.pr_actions: '["opened","reopened","ready_for_review","review_requested","synchronize"]'

          # Review Options
          pr_reviewer.require_score_review: "true"
          pr_reviewer.require_tests_review: "true"
          pr_reviewer.require_security_review: "true"

          # Debug
          config.verbosity_level: "2"
